[mod-setting-description]
etech-pickup-crashed-ship=Makes crash-site spaceship parts minable and gives placement items so you can pick them up and put them back down. Unrelated to the AAI recipe restore, hence its own switch. On by default.
etech-beacon-all-modules=Lets every beacon accept every module type, including productivity and quality modules. Applies to modded beacons too. On by default.
etech-quality-asteroid=Enables quality on all asteroid crushing and reprocessing recipes so quality modules in the crusher take effect. On by default.
etech-quality-module-slots=Every machine that has at least one module slot gains extra slots at higher quality - assemblers, furnaces, rocket silos, beacons, mining drills, and labs (modded ones included). Machines with no module slots are untouched. Replaces the retired QualityEffectsFixed mod with a blanket rule. Needs the Quality mod; on by default.
etech-nuclear-fuel-stack=Stack size for nuclear fuel. Vanilla is 1.
etech-artillery-shell-stack=Stack size for artillery shells. Vanilla is 1.
etech-ag-science-spoils=When on (default, vanilla), agricultural science packs spoil normally. Turn off to stop them spoiling.
etech-restore-nuclear-fuel=Krastorio 2 hides vanilla nuclear fuel (the rocket-fuel + U-235 train fuel). Turn on to bring the item and recipe back, unlocked by Kovarex enrichment like vanilla. Off by default because hiding it is a deliberate K2 balance choice.
etech-restore-engine-cosmetics=Restores the vanilla names and icons of engine units and electric engine units that AAI Industry renames ("Multi-cylinder engine" etc.). Turn off if another mod should own their look. On by default.
etech-debug-log=Writes one log line per recipe the restore engine touches or skips to factorio-current.log. Off by default - only the summary line is logged. Turn on when diagnosing why a recipe did or didn't revert.
etech-gleba-uranium=Adds uranium bacteria, mirroring iron/copper bacteria: jelly gives a 1% chance of uranium bacteria (Jellynut tech), bacteria + bioflux multiplies it in a biochamber (Bacteria cultivation tech), and it spoils into uranium ore. Port of the abandoned Simple Gleba Uranium mod by cindersash. Needs Space Age; off by default.
etech-void=Adds a cheap void chest (destroys any item put in it) and void pipe (destroys any fluid pumped in), unlocked by a small early technology. Port of the abandoned Easy Void mod; automatically skipped if the original mod is installed. Existing placed voids from the original survive the switch. Off by default.
etech-void-tint-r=Red part of the void chest/pipe color tint (0.0 - 1.0).
etech-void-tint-g=Green part of the void chest/pipe color tint (0.0 - 1.0).
etech-void-tint-b=Blue part of the void chest/pipe color tint (0.0 - 1.0).
etech-void-filtered=Adds a second, greenish void chest that only destroys the items YOU pick: open it and set an infinity filter to "exactly 0" for each item to void - everything else just sits. Same tech unlock as the normal void chest. Needs the void toggle above. Off by default.
etech-void-slots=Number of inventory slots in the void chest (1 - 10).
etech-fps-thrusters=Removes the animated exhaust plumes from space platform thrusters - the biggest FPS drain on large platforms. Port of the abandoned FPS Friendly Thrusters mod; automatically skipped if the original mod is installed. Off by default.
etech-fusion-passthrough=Gives the fusion generator input-output plasma connections on all four sides so generators can be chained without separate plasma lines. Port of the abandoned Pass-through fusion generator mod; automatically skipped if the original mod is installed. Off by default.
etech-colorful-biochamber=Recolors the biochamber's pools, dome and windows per recipe (RGB working visualisations), so you can tell what a biochamber is making at a glance. Port of the abandoned Colorful Biochamber mod (public domain); automatically skipped if the original mod is installed. Needs Space Age; off by default.
etech-copy-paste-modules=Shift-click paste copies modules too: taken straight from your inventory (old modules handed back), with a bot request for anything missing. Handles ghosts and remote view; furnaces, labs and beacons become cross-pastable. Port of the abandoned Copy Paste Modules mod by kajacx; automatically skipped if the original mod is installed. Off by default.
etech-total-productivity=Allows productivity modules on recipes the game normally forbids: belts, inserters, rails, pipes, solar panels, walls, ammo, equipment, and more. Four group toggles below pick the categories. Only single-output recipes are affected (multi-output recipes keep their vanilla rules). Port of the abandoned Total Productivity mod by AivanF; automatically skipped if the original mod is installed. Off by default.
etech-prod-logistics=Belts, inserters, containers, robots, rails, trains, vehicles, pipes, poles, combinators, and floor tiles.
etech-prod-buildings=Miners, assemblers, furnaces, labs, roboports, power (solar, accumulators, reactors, generators), radar, walls and gates, and Space Age platform parts.
etech-prod-military=Turrets, guns, ammo, capsules, land mines, armor, and equipment.
etech-prod-misc=Modules, beacons, repair packs, and launchable satellites/probes.
etech-jetpack-ui=Needs the Jetpack mod. While flying, shows a small movable window with the current fuel, inventory count, burn bar, and estimated remaining flight time. Port of Puppy's Jetpack UI with the window-position reset bug fixed; automatically skipped if the original mod is installed. Off by default.
etech-map-settings=Toolbar shortcut that opens an editor for map settings (pollution, evolution, enemy expansion, peaceful/no-enemies mode, spoilage rate) and per-surface map generation settings (admins only to apply). Port of the abandoned Edit Map Settings mod; automatically skipped if the original mod is installed. Off by default.
etech-resource-markers=Automatically tags resource patches on the map: one marker per patch with the resource icon and total amount (oil and other infinite resources show well count and average yield). Markers update as the map gets charted and ore gets mined. Delete a marker to hide that patch's marker for good; /etech-markers-rebuild rescans everything. Written for E-Tech (public domain), inspired by the abandoned Resource Map Label Marker mod.
etech-factory-hub=Adds the factory outlet (pulls items out of provider chests INSIDE Factorissimo factory buildings for the local logistic network), the factory inlet (distributes its contents into requester chests inside the factories) and the factory sensor (interior stock as circuit signals). Bots can't fly into factories, so these teleport the items across. Unlocked alongside logistic robotics and Factorissimo's chest connections. Needs Factorissimo 3; off by default.
etech-teleporters=Adds buildable teleporter pads (researched with chemical science). Walk onto a pad to open a map of your other pads and click one to teleport there. Pads are named, renamable, and shown as map tags. For pad-less teleporting straight to another player, see "Teleport-to-player shortcut" below. Port of the Teleporters mod by Klonan, updated for Factorio 2.1; off by default.
etech-teleport-shortcut=Adds a toolbar shortcut that teleports you to another player - no pads, no energy cost. One other player online: click teleports straight to them. Several: a picker window opens. Separate from the Teleporter pads feature (which has its own wireless remote for pad-to-pad jumps). Experimental multiplayer fun, off by default.
etech-teleporter-energy-mj=Energy drained from the DESTINATION pad's buffer per teleport. An unpowered pad can't be teleported to. 0 = teleporting is free (the original Teleporters mod behavior). Pad buffer is 200 MJ.
etech-teleporter-energy-distance-mj=Additional energy cost per 100 tiles of distance between the pads (same surface only). 0 = distance doesn't matter.
etech-teleporter-cross-surface=When on, pads on other surfaces (planets, space platforms) appear in the teleporter list. Turn off to restrict teleporting to the surface you're on.
etech-teleporter-cross-surface-multiplier=The per-teleport energy cost is multiplied by this when teleporting between surfaces. 1 = same as a local jump.
etech-teleporter-remote=Toolbar shortcut that opens the teleporter list from anywhere (after the Teleporter technology is researched). Energy is drained from the destination pad, so it can't take you to an unpowered base. This is the pad-network remote - the separate "Teleport-to-player shortcut" startup toggle jumps to players without pads.
etech-teleporter-remote-multiplier=The per-teleport energy cost is multiplied by this when using the wireless remote (no pad under your feet). Convenience premium; 1 = same as a pad-to-pad jump.
etech-teleporter-return-enabled=After a remote teleport, the teleporter list offers a free Return entry (with a live camera view) that takes you back to where you were standing. One slot, overwritten by the next remote jump.
etech-teleporter-return-grace-min=How long the Return entry stays available after a remote teleport. 0 = no time limit.
etech-teleporter-players-section=Shows your team's online players at the top of the teleporter list with map previews - click one to teleport to them (free, like the teleport-to-player shortcut).
etech-teleporter-alerts=Raises a map alert while a teleporter pad's energy buffer sits empty (only when teleporting costs energy). An unpowered pad can't be teleported to.
etech-markers-min-size=Patches with fewer resource tiles than this don't get a map marker. 1 = mark everything. Patches hidden by this limit are counted in the /etech-markers-rebuild summary.
etech-cpm-enabled=Per-player switch for the copy-modules-on-paste behavior. Only matters when the startup toggle is on.
etech-teleporter-sound-volume=Volume of the teleport sound you hear. 0 = silent, 1 = default, 2 = double.
etech-teleporter-preview-size=Size of the minimap preview per pad in your destination list. Smaller = more pads on screen.
etech-teleporter-hide-platforms=When on, pads on space platforms don't appear under "All surfaces" in your list (reduces noise with many ships). Selecting a platform in the surface dropdown still shows its pads.
