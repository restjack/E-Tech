[entity-description]
etech-factory-provider-hub=Bridges the Factorissimo factory buildings on this surface with the outside logistic network: whenever the network has unmet demand (requester chests, players, spidertrons, construction ghosts), the matching items teleport out of the factories' provider chests into the outlet. Robots can't fly into factories — the outlet does it for them. One outlet per surface; it only sees this planet's factories. Open it to browse the factories' stock (shift-click takes a stack straight out), and filter what it may pull. Connect a circuit wire to gate it: it only runs while receiving a nonzero signal. Mining it returns any held items to the factories.
etech-factory-inlet=The factory outlet's counterpart: fill it (by hand or with bot requests) and it distributes its contents into the requester and buffer chests inside the Factorissimo factory buildings on this surface, up to their requested amounts. Mining it returns the buffered items to the factories.
etech-factory-sensor=Outputs the total contents of the provider chests inside the Factorissimo factory buildings on this surface as circuit signals. Connect with a wire to see your factories' stock on the circuit network.
etech-factory-fluid-outlet=Fills itself with fluid from the storage tanks inside the Factorissimo factory buildings on this surface. Handles one fluid at a time — open it and pick the fluid in the "Fluid to pull" panel (with several fluids inside the factories, that's the way to choose). Without a pick it locks onto whatever it currently holds. Changing the pick flushes the old fluid back into matching interior tanks. Place one per fluid and pipe it into your outside network.
etech-factory-fluid-inlet=The fluid outlet's counterpart: pump fluid in and it drains itself into the storage tanks inside the Factorissimo factory buildings on this surface that already hold the same fluid (it never fills empty or foreign tanks).

