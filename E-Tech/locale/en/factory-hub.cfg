[technology-description]
etech-factory-provider-hub=The factory outlet, inlet and sensor: pull items out of the provider chests inside Factorissimo factory buildings, push items into their requester chests, and read their stock as circuit signals — bridging factory interiors with the outside logistic network.

[gui-etech-hub]
panel-title=Inside the factories
panel-empty=Nothing found (no provider chests, or nothing matches the search).
rate=Pulled last minute: __1__ items
pull-settings=Pull settings
mode-all=Pull all items
mode-whitelist=Only selected items
mode-blacklist=All except selected items
cap-label=Stacks per item:
cap-tooltip=How many stacks of each item this outlet keeps buffered (buffer mode). Empty = use the map setting.
prio-label=Priority:
prio-tooltip=Outlets with a lower number pull first each pass (1 = first). Empty = 100. Matters when several outlets compete for scarce items.
on-demand=On-demand mode
on-demand-tooltip=Instead of keeping stacks buffered, sit empty and only fetch items when this logistic network has unmet requester demand (requester/buffer chests, players, spidertrons). Leaner, but delivery takes a moment longer and construction ghosts aren't covered.
circuit=Circuit enable
circuit-tooltip=Only work while any nonzero circuit signal reaches this chest (red or green wire). No wire = paused.
storage=Also pull from storage chests
storage-tooltip=Additionally empty the yellow storage chests inside the factories (deconstruction leftovers and the like), not just provider chests.
item-hint=\nLeft-click: show on map. Right-click: pin to top.
factories=Factories (click Map, or type to name)
locate=Map
inlet-title=Factory inlet
inlet-rate=Delivered last minute: __1__ items
auto-request=Auto-request what the factories need
auto-request-tooltip=Reads the unmet requests of the requester/buffer chests inside the factories and sets them as this inlet's own bot requests (the managed "etech-inlet-auto" group in its logistics tab). Outside bots then deliver exactly what's needed and the inlet forwards it inside.
