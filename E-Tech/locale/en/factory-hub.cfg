[entity-name]
etech-factory-provider-hub=Factory outlet
etech-factory-inlet=Factory inlet
etech-factory-sensor=Factory sensor

[entity-description]
etech-factory-provider-hub=Automatically pulls items out of the provider chests inside the Factorissimo factory buildings on this surface and offers them to the local logistic network as a passive provider. Robots can't fly into factories — the outlet teleports the items out for them. Open it to see what's inside the factories, filter what it pulls, and override the per-item cap. Mining it returns the buffered items to the factories.
etech-factory-inlet=The factory outlet's counterpart: fill it (by hand or with bot requests) and it distributes its contents into the requester and buffer chests inside the Factorissimo factory buildings on this surface, up to their requested amounts. Mining it returns the buffered items to the factories.
etech-factory-sensor=Outputs the total contents of the provider chests inside the Factorissimo factory buildings on this surface as circuit signals. Connect with a wire to see your factories' stock on the circuit network.

