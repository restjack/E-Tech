[technology-description]
etech-factory-provider-hub=The factory outlet, inlet and sensor: pull items out of the provider chests inside Factorissimo factory buildings, push items into their requester chests, and read their stock as circuit signals — bridging factory interiors with the outside logistic network.

[tips-and-tricks-item-name]
etech-factory-outlet=Factory outlet, inlet & sensor

[tips-and-tricks-item-description]
etech-factory-outlet=Robots can't fly into Factorissimo factory buildings, so the [entity=etech-factory-provider-hub] Factory outlet bridges the gap: place ONE per surface, and whenever the outside logistic network needs something — requester chests, players, spidertrons, construction ghosts — the matching items teleport out of the provider chests inside the factories.\n - Open the outlet to browse everything inside the factories. Left-click an item to see which factory holds it, shift-click to take a stack, right-click to pin it to the top.\n - Connect a circuit wire to gate the outlet: it then only runs while receiving a nonzero signal. No wire = always on.\n - The [entity=etech-factory-inlet] Factory inlet does the reverse: fill it (or turn on auto-request) and it feeds the requester and buffer chests inside the factories.\n - The [entity=etech-factory-sensor] Factory sensor broadcasts the factories' stock as circuit signals.

