etech-rm-rebuild-help=Rebuild all E-Tech resource map markers from scratch (rescans every charted chunk).
etech-rm-rebuilt=[E-Tech] Resource markers rebuilt (__1__ chunks scanned; __2__ patches hidden by the minimum-size setting or still unplaceable).
etech-rm-rebuild-started=[E-Tech] Resource marker rebuild started — __1__ chunks queued, scanning in the background.
etech-rm-clean-legacy-help=Find leftover resource markers from other marker mods (script-made tags with a resource icon that aren't E-Tech's). Without arguments: count only. With "confirm": delete them.
etech-rm-legacy-found=[E-Tech] Found __1__ leftover resource markers from other mods. Run "/etech-markers-clean-legacy confirm" to delete them. Player-placed tags are never touched.
etech-rm-legacy-removed=[E-Tech] Removed __1__ leftover resource markers from other mods.
