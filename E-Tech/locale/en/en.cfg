[tips-and-tricks-item-description]
etech-overview=E-Tech restores vanilla recipes under AAI Industry and bundles optional quality-of-life features — all off by default. Open Settings → Mod settings to pick what's active: crashed-ship pickup, all modules in beacons, void chest & pipe, teleporter pads, resource map markers, the factory outlet for Factorissimo, and more. A feature only exists in the game while its toggle is on.
