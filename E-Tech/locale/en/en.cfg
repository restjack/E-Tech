[tips-and-tricks-item-name]
etech-overview=E-Tech

[tips-and-tricks-item-description]
etech-overview=E-Tech restores vanilla recipes under AAI Industry and bundles optional quality-of-life features. A few vanilla-behavior restores are on by default (crashed-ship pickup, all modules in beacons, quality in asteroid crushing, quality module slots); everything that adds content is off by default. Open Settings → Mod settings to pick what's active: void chest & pipe, teleporter pads, resource map markers, the factory outlet/inlet/sensor for Factorissimo, and more. A feature only exists in the game while its toggle is on.
